<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Invoice</title>
    <style>
      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        html, body {
          height: auto !important;
          min-height: 0 !important;
          overflow: visible !important;
          margin: 0 !important;
          padding: 0 !important;
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        .no-print,
        ::-webkit-calendar-picker-indicator,
        ::-webkit-inner-spin-button,
        ::-webkit-clear-button {
          display: none !important;
          -webkit-appearance: none !important;
        }
        input[type="date"] {
          appearance: none !important;
          -webkit-appearance: none !important;
          -moz-appearance: none !important;
          background: transparent !important;
        }
        .print-container {
          box-shadow: none !important;
          border: none !important;
          padding: 10px !important;
          margin: 0 auto !important;
          max-width: 100% !important;
          width: 100% !important;
          min-height: 0 !important;
          page-break-after: auto !important;
          page-break-inside: avoid !important;
          page-break-before: auto !important;
        }
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans min-h-screen py-8 selection:bg-indigo-100 selection:text-indigo-900">
    <div class="max-w-7xl mx-auto mb-6 flex justify-between items-center no-print px-4 flex-wrap gap-4">
      <button id="btnBack" class="px-5 py-2.5 bg-white text-slate-700 rounded-xl hover:bg-slate-100 hover:text-slate-900 transition-all font-semibold shadow-sm border border-slate-200 hover:shadow flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" class="text-slate-500" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Kembali
      </button>

      <div class="flex gap-3">
        <button id="btnPrint" class="px-6 py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-700 text-white font-semibold rounded-xl hover:from-indigo-700 hover:to-indigo-800 transition-all shadow-md shadow-indigo-200 hover:shadow-lg hover:-translate-y-0.5 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
          Print Invoice
        </button>
        <button id="btnPdf" class="px-6 py-2.5 bg-gradient-to-r from-rose-500 to-rose-600 text-white font-semibold rounded-xl hover:from-rose-600 hover:to-rose-700 transition-all shadow-md shadow-rose-200 hover:shadow-lg hover:-translate-y-0.5 flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
          Download PDF
        </button>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 lg:flex lg:gap-8 items-start">
      <!-- Invoice Preview (Left) -->
      <div id="invoiceContainer" class="flex-1 bg-white p-8 rounded-3xl shadow-2xl shadow-indigo-100/40 border border-slate-200 print-container mb-8">
        <!-- Invoice content will be rendered here -->
      </div>

      <!-- Settings Sidebar (Right) -->
      <div id="stylePanelContainer" class="w-full lg:w-72 flex-shrink-0 no-print">
        <!-- Style settings will be rendered here -->
      </div>
    </div>

    <script type="module" src="/src/invoiceGenerator.js"></script>
  </body>
</html>
