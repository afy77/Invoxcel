<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invoxcel</title>
    <link rel="icon" type="image/png" href="/LOGO.png" />
  </head>
  <body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans min-h-screen selection:bg-indigo-100 selection:text-indigo-900 dark:selection:bg-indigo-900/50 dark:selection:text-indigo-100 transition-colors duration-200 print:bg-white print:text-black">
    
    <!-- Header -->
    <header class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-b border-gray-100 dark:border-slate-700/50 sticky top-0 z-10 transition-all shadow-sm print:hidden">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <h1 class="text-2xl font-extrabold flex items-center gap-2 tracking-tight">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" class="text-indigo-600 dark:text-indigo-400 lucide lucide-table" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/></svg>
          <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-400">
            Invoxcel
          </span>
        </h1>
        
        <button class="theme-toggle-btn relative inline-flex h-8 w-[60px] shrink-0 cursor-pointer border-[3px] border-slate-200 dark:border-slate-700 items-center rounded-full bg-slate-200 dark:bg-slate-700 transition-colors duration-300 ease-in-out focus:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 shadow-inner" title="Toggle Theme">
          <span class="sr-only">Toggle dark mode</span>
          <!-- Track Icons (Background empty/dots for visual flair if desired, or let's keep it minimalist) -->
          <!-- Thumb -->
          <span class="theme-toggle-thumb translate-x-0 dark:translate-x-[28px] pointer-events-none absolute left-0 inline-flex h-6 w-6 transform items-center justify-center rounded-full bg-white shadow shadow-slate-400 dark:shadow-slate-900 ring-0 transition-transform duration-300 ease-in-out">
            <!-- Sun Icon (Opacity fades out in dark mode) -->
            <span class="absolute inset-0 flex items-center justify-center transition-opacity duration-300 opacity-100 dark:opacity-0">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-amber-500"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            </span>
            <!-- Moon Icon (Opacity fades in in dark mode) -->
            <span class="absolute inset-0 flex items-center justify-center transition-opacity duration-300 opacity-0 dark:opacity-100">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" class="text-indigo-500" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </span>
          </span>
        </button>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      
      <!-- Upload Section -->
      <div class="mb-8 print:hidden">
        <div id="dropZone" class="border-2 border-dashed border-indigo-200 dark:border-indigo-500/30 rounded-3xl p-14 text-center bg-white/60 dark:bg-slate-800/60 hover:bg-white dark:hover:bg-slate-800 hover:border-indigo-400 dark:hover:border-indigo-400 transition-all duration-300 cursor-pointer shadow-sm hover:shadow-md group relative overflow-hidden">
          <div class="absolute inset-0 bg-gradient-to-br from-indigo-50/50 to-violet-50/50 dark:from-indigo-900/20 dark:to-violet-900/20 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
          <div class="relative z-10">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-100 to-violet-100 dark:from-indigo-900/40 dark:to-violet-900/40 text-indigo-600 dark:text-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-300 shadow-sm border border-transparent dark:border-indigo-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-upload-cloud"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-2">Unggah File Excel</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-8 max-w-sm mx-auto">Drag & drop file .xlsx atau .xls di sini, atau klik untuk memilih file dari komputer Anda.</p>
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls, .csv" />
            <div class="flex justify-center">
              <button id="btnPilihFile" class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-violet-600 dark:from-indigo-500 dark:to-violet-500 text-white font-medium rounded-xl hover:from-indigo-700 hover:to-violet-700 dark:hover:from-indigo-600 dark:hover:to-violet-600 hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 dark:focus:ring-offset-slate-900 transition-all duration-300 transform hover:-translate-y-0.5">
                Pilih File Excel
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Loading Indicator -->
      <div id="loadingIndicator" class="hidden flex justify-center items-center py-12 print:hidden">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 dark:border-indigo-400"></div>
        <span class="ml-3 text-gray-600 dark:text-gray-300 font-medium">Memproses file...</span>
      </div>

      <div class="max-w-7xl mx-auto mb-8 flex justify-end no-print px-4">
        <button id="btnPrintAll" class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all flex items-center gap-2 font-bold shadow-md shadow-indigo-100 dark:shadow-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
          Cetak Semua Invoice
        </button>
      </div>

      <!-- Tables Container -->
      <div id="tablesContainer" class="space-y-8 pb-12">
        <!-- Tables will be rendered here -->
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
